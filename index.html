<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九重紫 Kokonoe Yukari 专属音乐站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="music-card">
        <img src="images/avatar.jpg" alt="九重紫头像" class="avatar" id="cover">
        
        <h2>九重紫 Kokonoe Yukari</h2>
        <p id="song-title">♪ 准备播放</p>
        
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="controls">
            <button class="pill-btn small-btn" id="prev-btn">上一首</button>
            <button class="pill-btn play-btn" id="play-btn">播放</button>
            <button class="pill-btn small-btn" id="next-btn">下一首</button>
        </div>

        <div class="lyrics-box">
            <p id="lyrics-text">歌词将在这里显示...</p>
        </div>
        
        <audio id="audio-player" src="music/test.mp3"></audio>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
