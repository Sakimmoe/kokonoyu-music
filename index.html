<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九重紫 Kokonoe Yukari 专属音乐站</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="music-card">
        <img src="images/avatar.jpg" alt="封面" class="avatar fade-transition" id="cover">
        
        <h2 id="song-title" class="song-name fade-transition">准备播放</h2>
        <p class="artist-name">九重紫 Kokonoe Yukari</p>
        
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="controls-main">
            <button class="theme-icon-btn" id="mode-btn" title="切换播放模式">🔁</button>
            <button class="pill-btn icon-btn" id="prev-btn">⏮</button>
            <button class="pill-btn play-btn" id="play-btn">▶ 播放</button>
            <button class="pill-btn icon-btn" id="next-btn">⏭</button>
        </div>

        <div class="controls-sub">
            <button class="pill-btn list-btn" id="playlist-btn">🎵 展开歌单</button>
        </div>

        <div class="playlist-wrapper" id="playlist-wrapper">
            <div class="playlist-box">
                <ul id="playlist-list"></ul>
            </div>
        </div>
        
        <audio id="audio-player" src="music/test.mp3"></audio>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
