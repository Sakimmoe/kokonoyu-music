<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九重紫 Kokonoe Yukari 专属音乐站</title>
    
    <link rel="icon" type="image/png" href="images/favicon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="music-card">
        <img src="images/avatar.jpg" alt="封面" class="avatar fade-transition" id="cover">
        
        <h2 id="song-title" class="song-name fade-transition">准备播放</h2>
        <p class="artist-name">九重紫 Kokonoe Yukari</p>
        
        <div class="progress-container" id="progress-container">
            <div class="progress" id="progress"></div>
        </div>
        
        <div class="controls-main">
            <button class="circle-btn" id="prev-btn"><i class="fa-solid fa-backward-step"></i></button>
            <button class="play-btn" id="play-btn"><i class="fa-solid fa-play"></i> 播放</button>
            <button class="circle-btn" id="next-btn"><i class="fa-solid fa-forward-step"></i></button>
        </div>

        <div class="controls-sub">
            <button class="sub-btn" id="mode-btn"><i class="fa-solid fa-repeat"></i> 列表循环</button>
            <button class="sub-btn" id="playlist-btn"><i class="fa-solid fa-list-ul"></i> 展开歌单</button>
        </div>

        <div class="playlist-wrapper" id="playlist-wrapper">
            <div class="playlist-box">
                <ul id="playlist-list"></ul>
            </div>
        </div>
        
        <audio id="audio-player" src="music/test.mp3"></audio>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
